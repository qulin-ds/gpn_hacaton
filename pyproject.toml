[project]
name = "pdf-parsing-baseline"
version = "0.1.0"
description = "Baseline (marker-pdf) для парсинга PDF в Markdown + публичный датасет"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Hackathon Organizers" }]
dependencies = [
    "Pillow>=10,<11",
    "marker-pdf>=1.10.2",
]

[project.scripts]
baseline-marker = "baseline.marker_baseline:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["baseline"]
